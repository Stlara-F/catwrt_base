name: Build CatWrt Docker Image

on:
  workflow_dispatch:          # 允许手动触发
  schedule:
    - cron: '0 0 * * 0'       # 每周日 UTC 0 点自动编译一次（可按需调整）

env:
  LEDE_REPO: https://github.com/coolsnowwolf/lede.git
  LEDE_BRANCH: master
  CATWRT_BASE_REPO: https://github.com/miaoermua/catwrt_base.git
  TARGET_ARCH: x86_64         # 目标架构，可根据需要修改为 aarch64 等
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（包含你的 Dockerfile 和 entrypoint）
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置编译缓存，大幅加快后续构建速度
      - name: Cache LEDE build
        uses: actions/cache@v4
        with:
          path: |
            lede/build_dir
            lede/staging_dir
            lede/tmp
            lede/dl
          key: ${{ runner.os }}-lede-${{ hashFiles('lede/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-lede-

      # 3. 安装编译依赖（直接使用 catwrt_base README 中的命令）
      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      # 4. 克隆 Lean's LEDE 源码
      - name: Clone LEDE source
        run: |
          git clone --depth 1 --branch $LEDE_BRANCH $LEDE_REPO lede
          cd lede
          # 更新 feeds 配置文件（可选）
          sed -i 's/#src-git helloworld/src-git helloworld/g' feeds.conf.default

      # 5. 更新 feeds 并下载软件包源码
      - name: Update feeds and download packages
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j$(nproc)

      # 6. 首次编译（生成基础环境，确保后续定制脚本能正常运行）
      - name: First make (prepare environment)
        run: |
          cd lede
          make -j$(nproc) V=s || true   # 即使失败也继续，有时首次编译会因缺失某些依赖报错但环境已就绪

      # 7. 克隆 catwrt_base 并应用定制脚本
      - name: Apply CatWrt customization
        run: |
          cd $HOME
          git clone $CATWRT_BASE_REPO catwrt_base
          cd catwrt_base
          chmod +x pull.sh main.sh
          # 执行更新插件脚本
          sudo bash pull.sh
          # 刷写 CatWrt 版本号和关键文件
          sudo bash main.sh

      # 8. 最终编译（生成带有 CatWrt 定制的固件）
      - name: Final build
        run: |
          cd lede
          # 如果需要自定义配置，可在此处通过 sed 修改 .config
          # 例如：开启 Docker 内核支持等
          make -j$(nproc) V=s

      # 9. 准备 Docker 构建上下文
      - name: Prepare Docker context
        run: |
          # 复制生成的 rootfs.tar.gz 到工作目录
          cp lede/bin/targets/${{ env.TARGET_ARCH }}/generic/openwrt-${{ env.TARGET_ARCH }}-generic-rootfs.tar.gz rootfs.tar.gz || \
          cp lede/bin/targets/${{ env.TARGET_ARCH }}/generic/openwrt-*-rootfs.tar.gz rootfs.tar.gz || \
          echo "Rootfs not found, check target path"
          # 确保 entrypoint 脚本存在且可执行
          if [ -f docker-entrypoint.sh ]; then
            chmod +x docker-entrypoint.sh
          fi
          # 列出文件确认
          ls -la

      # 10. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 11. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}
