name: Build and Push CatWrt Builder Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'build_catwrt_ci.sh'
      - 'docker-entrypoint.sh'
      - '.github/workflows/**'
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本标签'
        required: false
        default: ''
      firmware_arch:
        description: '选择要编译的固件架构（仅测试参考）'
        required: false
        default: 'amd64'
        type: choice
        options:
          - amd64
          - mt798x
          - mt7621
          - meson64
          - meson32
          - rkarm64
      firmware_ver:
        description: '固件版本（仅测试参考）'
        required: false
        default: 'v24.9'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt-builder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # 极限清理磁盘 + 开启 Swap
      - name: Free Disk Space & Add Swap
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build and export for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          echo "测试容器启动..."
          docker run --rm ${{ env.IMAGE_NAME }}:test --help 2>&1 | grep -q "CatWrt" || echo "警告: 未找到帮助信息，继续测试"
          
          echo "测试环境完整性..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -c "
            command -v git make gcc curl sudo ccache
            id builder
            test -w /home/lede && test -w /output
            echo '所有测试通过!'
          "
          
          echo "测试编译脚本语法..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -n /usr/local/bin/catwrt-build 2>/dev/null || true

      # 构建并推送多架构Docker镜像（宿主机架构：amd64+arm64）
      - name: Build and push (Multi-Arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"

      # 🔥 修复：完整闭合README，无语法错误
      - name: Generate Docker Hub README
        run: |
          cat > DOCKER_README.md << EOF
          # CatWrt Builder Docker 镜像
          全自动 CatWrt 编译环境，支持多架构固件编译

          ## 🚀 快速使用
          ### 拉取镜像
          \`\`\`bash
          docker pull docker.io/${{ secrets.DOCKER_USERNAME }}/catwrt-builder:latest
          \`\`\`

          ### 编译命令（通用）
          \`\`\`bash
          docker run --rm \\
            -v \$(pwd)/output:/output \\
            docker.io/${{ secrets.DOCKER_USERNAME }}/catwrt-builder:latest \\
            --auto --arch=amd64 --ver=v24.9
          \`\`\`
          EOF

      - name: Summary
        run: |
          echo "## Docker 镜像构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**支持架构:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
