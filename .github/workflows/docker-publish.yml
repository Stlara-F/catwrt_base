name: Build and Push CatWrt Builder Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'build_catwrt_ci.sh'
      - 'docker-entrypoint.sh'
      - '.github/workflows/**'
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本标签'
        required: false
        default: ''
      # 🔥 新增：选择固件架构（编译时用）
      firmware_arch:
        description: '选择要编译的固件架构'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - mt798x
          - mt7621
          - meson64
          - meson32
          - rkarm64
      firmware_ver:
        description: '固件版本（如 v24.9）'
        required: false
        default: 'v24.9'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt-builder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ---------- 极限清理磁盘 + 开启 Swap ----------
      - name: Free Disk Space & Add Swap
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # 🔥 1. 升级 QEMU，支持多架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      # 🔥 2. 先构建单架构用于测试
      - name: Build and export for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"

      # 🔥 3. 保留原来的测试步骤
      - name: Test image
        run: |
          echo "测试容器启动..."
          docker run --rm ${{ env.IMAGE_NAME }}:test --help 2>&1 | grep -q "CatWrt" || echo "警告: 未找到 CatWrt 帮助信息，继续测试..."
          
          echo "测试环境完整性..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -c "
            command -v git make gcc curl sudo ccache
            id builder
            test -w /home/lede && test -w /output
            echo '所有测试通过!'
          "
          
          echo "测试编译脚本语法..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -n /usr/local/bin/catwrt-build 2>/dev/null || echo "警告: 脚本路径可能不同，跳过语法测试"

      # 🔥 4. 构建并推送多架构镜像
      - name: Build and push (Multi-Arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 🔥 支持 x86_64 和 ARM64 两种 Docker 镜像
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"

      # 🔥 5. 动态生成 Docker Hub README（修复之前的错误）
      - name: Generate Docker Hub README
        run: |
          cat > DOCKER_README.md << 'EOF'
          # CatWrt Builder Docker 镜像
          
          ## 🚀 快速使用
          
          ```bash
          ### 拉取镜像
          docker pull docker.io/${{ secrets.DOCKER_USERNAME }}/catwrt-builder:latest

          ### 运行编译（示例：amd64 v24.9）
          docker run --rm \
            -v $(pwd)/output:/output \
            -e CATWRT_USER=builder \
            docker.io/${{ secrets.DOCKER_USERNAME }}/catwrt-builder:latest \
            --auto --arch=amd64 --ver=v24.9
            
      - name: Summary
        run: |
          echo "## Docker 镜像构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**标签:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**资源使用:**" >> $GITHUB_STEP_SUMMARY
          df -h . | awk 'NR==2 {print "- 工作空间: " $3 " / " $2}' >> $GITHUB_STEP_SUMMARY
          free -h | awk 'NR==2 {print "- 内存: " $3 " / " $2}' >> $GITHUB_STEP_SUMMARY
