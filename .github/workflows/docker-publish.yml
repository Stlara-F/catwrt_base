name: Build CatWrt Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  LEDE_REPO: https://github.com/coolsnowwolf/lede.git
  LEDE_BRANCH: master
  CATWRT_BASE_REPO: https://github.com/miaoermua/catwrt_base.git
  TARGET_ARCH: x86_64
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LEDE build
        uses: actions/cache@v4
        with:
          path: |
            lede/build_dir
            lede/staging_dir
            lede/tmp
            lede/dl
          # 优化缓存key，添加架构和分支标记，避免缓存污染
          key: ${{ runner.os }}-lede-${{ env.LEDE_BRANCH }}-${{ env.TARGET_ARCH }}-${{ hashFiles('lede/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-lede-${{ env.LEDE_BRANCH }}-${{ env.TARGET_ARCH }}-

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint bc binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpam0g-dev \
            libpci-dev libpython3-dev libreadline-dev libssl-dev libtool libunistring-dev llvm lrzsz msmtp \
            ninja-build p7zip p7zip-full patch pciutils pkgconf python3 python3-pyelftools python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
            xmlto xxd zlib1g-dev libncurses-dev libzstd-dev liblzma-dev

      - name: Clone LEDE source
        run: |
          git clone --depth 1 --branch $LEDE_BRANCH $LEDE_REPO lede
          cd lede
          # 修复feeds分支匹配：lede master 对应 luci master，避免版本不匹配
          sed -i 's/#src-git helloworld/src-git helloworld https:\/\/github.com\/fw876\/helloworld.git/g' feeds.conf.default
          sed -i 's/src-git luci https:\/\/github.com\/coolsnowwolf\/luci.git;openwrt-23.05/src-git luci https:\/\/github.com\/coolsnowwolf\/luci.git;master/g' feeds.conf.default

      - name: Update feeds
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 自动安装缺失的基础依赖，解决依赖校验警告
          ./scripts/feeds install bc pciutils libpam libunistring csstidy luasrcdiet
          ./scripts/feeds install -f libxcrypt # 强制覆盖核心包，解决覆盖警告

      # ---------- 修复核心：构建host工具时，临时取消TARGET_ARCH环境变量，避免污染编译命令 ----------
      - name: Build host tools and conf
        id: build_conf
        run: |
          cd lede
          # 临时取消TARGET_ARCH，避免它被错误传递给gcc，导致编译参数错误
          unset TARGET_ARCH
          make tools/install -j$(nproc) V=s
          make toolchain/install -j$(nproc) V=s
          make -C scripts/config conf V=s 2>&1 | tee conf_build.log
          if [ -f scripts/config/conf ]; then
            echo "CONF_BUILT=success" >> $GITHUB_OUTPUT
          else
            echo "CONF_BUILT=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload conf build log on failure
        if: steps.build_conf.outputs.CONF_BUILT == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: conf-build-log
          path: lede/conf_build.log

      - name: Fail job if conf build failed
        if: steps.build_conf.outputs.CONF_BUILT == 'failed'
        run: |
          echo "❌ conf tool failed to build. Please check the uploaded artifact 'conf-build-log' for details."
          exit 1

      # ---------- 恢复TARGET_ARCH，进行目标架构的编译 ----------
      - name: Download packages
        run: |
          cd lede
          # 恢复TARGET_ARCH，配置目标架构
          export TARGET_ARCH=$TARGET_ARCH
          make defconfig
          # 重试3次下载，避免网络波动
          for i in 1 2 3; do make download -j$(nproc) && break; sleep 10; done

      - name: First minimal build (optional)
        run: |
          cd lede
          make -j$(nproc) V=s || true

      - name: Apply CatWrt customization
        run: |
          cd $HOME
          git clone $CATWRT_BASE_REPO catwrt_base
          cd catwrt_base
          chmod +x pull.sh main.sh
          # 修复权限，避免sudo的权限问题
          sudo -E bash pull.sh
          sudo -E bash main.sh

      - name: Final build
        run: |
          cd lede
          make -j$(nproc) V=s

      - name: Prepare Docker context
        run: |
          ROOTFS_PATH=$(find lede/bin/targets -name "openwrt-*-rootfs.tar.gz" | head -n 1)
          if [ -z "$ROOTFS_PATH" ]; then
            echo "Rootfs not found, check target path"
            exit 1
          fi
          cp "$ROOTFS_PATH" rootfs.tar.gz
          if [ -f docker-entrypoint.sh ]; then
            chmod +x docker-entrypoint.sh
          fi
          ls -la

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.TARGET_ARCH }}
          # 添加镜像标签，方便识别
          labels: |
            org.opencontainers.image.title=CatWrt
            org.opencontainers.image.description=CatWrt Docker Image
            org.opencontainers.image.source=https://github.com/miaoermua/catwrt_base
            org.opencontainers.image.version=${{ github.run_number }}
