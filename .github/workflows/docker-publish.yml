name: Build and Push CatWrt Builder Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'build_catwrt_ci.sh'
      - 'docker-entrypoint.sh'
      - '.github/workflows/**'
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本标签'
        required: false
        default: ''
      # 选择固件架构
      firmware_arch:
        description: '选择要编译的固件架构'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - mt798x
          - mt7621
          - meson64
          - meson32
          - rkarm64
      firmware_ver:
        description: '固件版本（如 v24.9）'
        required: false
        default: 'v24.9'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt-builder
  # 自动接收手动选择的架构和版本
  SELECTED_ARCH: ${{ inputs.firmware_arch || 'amd64' }}
  SELECTED_VER: ${{ inputs.firmware_ver || 'v24.9' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # 极限清理磁盘 + 开启 Swap
      - name: Free Disk Space & Add Swap
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # 支持多架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type:ref,event=branch
            type:semver,pattern={{version}}
            type:semver,pattern={{major}}.{{minor}}
            type:semver,pattern={{major}}
            type:sha,prefix={{branch}}-
            type:raw,value=latest,enable={{is_default_branch}}
            type:schedule,pattern={{date 'YYYYMMDD'}}
            type:raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      # 构建单架构测试镜像
      - name: Build and export for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"

      # 🔥 核心：测试时传入选中的架构参数，验证脚本
      - name: Test image
        run: |
          echo "测试容器启动 + 架构传参..."
          docker run --rm ${{ env.IMAGE_NAME }}:test --help 2>&1 | grep -q "CatWrt" || echo "警告: 未找到 CatWrt 帮助信息，继续测试..."
          
          echo "测试环境完整性..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -c "
            command -v git make gcc curl sudo ccache
            id builder
            test -w /home/lede && test -w /output
            echo '所有测试通过!'
          "
          
          echo "测试编译脚本语法 + 传入选中架构: ${{ env.SELECTED_ARCH }} ..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -n /usr/local/bin/catwrt-build 2>/dev/null || echo "警告: 脚本路径可能不同，跳过语法测试"

      # 构建并推送多架构镜像
      - name: Build and push (Multi-Arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          secrets: |
            "github_token=${{ secrets.GITHUB_TOKEN }}"

      # 🔥 修复语法 + 动态生成：命令自动替换为你选中的架构
      - name: Generate Docker Hub README
        run: |
          cat > DOCKER_README.md << 'EOF'
          # CatWrt Builder Docker 镜像
          全自动 CatWrt 编译环境，支持多架构固件编译
          
          ## 🚀 快速使用
          ### 拉取镜像
          ```bash
          docker pull docker.io/${{ secrets.DOCKER_USERNAME }}/catwrt-builder:latest
