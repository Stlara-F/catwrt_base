# .github/workflows/build-push-docker.yml
# 构建 CatWrt 编译环境镜像并推送到 Docker Hub
# 优化: 添加测试步骤、语义化版本标签、多平台构建准备

name: Build and Push CatWrt Builder Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'build_catwrt_ci.sh'
      - 'docker-entrypoint.sh'
      - '.github/workflows/**'
    tags:
      - 'v*'
  schedule:
    # 每周日 UTC 0 点重建，更新基础镜像
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本标签'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt-builder

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      id-token: write  # 用于 cosign 签名（可选）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于版本生成

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build and export for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true  # 加载到本地用于测试
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          echo "测试容器启动..."
          docker run --rm ${{ env.IMAGE_NAME }}:test --help | grep -q "CatWrt"
          
          echo "测试环境完整性..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -c "
            # 检查关键命令
            command -v git make gcc curl sudo ccache
            # 检查用户
            id builder
            # 检查目录权限
            test -w /home/lede && test -w /output
            echo '所有测试通过!'
          "
          
          echo "测试编译脚本语法..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -n /usr/local/bin/catwrt-build

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "CatWrt 全自动编译环境 Docker 镜像"
          readme-filepath: ./DOCKER_README.md

      - name: Summary
        run: |
          echo "## Docker 镜像构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**标签:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
