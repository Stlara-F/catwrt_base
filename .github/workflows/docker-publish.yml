name: Build CatWrt Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  LEDE_REPO: https://github.com/coolsnowwolf/lede.git
  LEDE_BRANCH: master
  CATWRT_BASE_REPO: https://github.com/miaoermua/catwrt_base.git
  TARGET_ARCH: x86_64
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LEDE build
        uses: actions/cache@v4
        with:
          path: |
            lede/build_dir
            lede/staging_dir
            lede/tmp
            lede/dl
          key: ${{ runner.os }}-lede-${{ hashFiles('lede/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-lede-

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint bc binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpam0g-dev \
            libpci-dev libpython3-dev libreadline-dev libssl-dev libtool libunistring-dev llvm lrzsz msmtp \
            ninja-build p7zip p7zip-full patch pciutils pkgconf python3 python3-pyelftools python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
            xmlto xxd zlib1g-dev libncurses-dev libzstd-dev liblzma-dev

      - name: Clone LEDE source
        run: |
          git clone --depth 1 --branch $LEDE_BRANCH $LEDE_REPO lede
          cd lede
          sed -i 's/#src-git helloworld/src-git helloworld/g' feeds.conf.default

      - name: Update feeds
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ---------- 提前构建 conf 工具，避免后续步骤因它失败而中断 ----------
      - name: Build host tools and conf
        id: build_conf
        continue-on-error: true
        run: |
          cd lede
          make tools/install -j1 V=s
          make toolchain/install -j1 V=s
          make -C scripts/config conf V=s 2>&1 | tee conf_build.log
          if [ -f scripts/config/conf ]; then
            echo "CONF_BUILT=success" >> $GITHUB_OUTPUT
          else
            echo "CONF_BUILT=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload conf build log on failure
        if: steps.build_conf.outputs.CONF_BUILT == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: conf-build-log
          path: lede/conf_build.log

      - name: Fail job if conf build failed
        if: steps.build_conf.outputs.CONF_BUILT == 'failed'
        run: |
          echo "❌ conf tool failed to build. Please check the uploaded artifact 'conf-build-log' for details."
          exit 1

      # ---------- conf 构建成功后，继续正常流程 ----------
      - name: Download packages
        run: |
          cd lede
          make defconfig
          make download -j$(nproc)

      - name: First minimal build (optional)
        run: |
          cd lede
          make -j1 V=s || true

      - name: Apply CatWrt customization
        run: |
          cd $HOME
          git clone $CATWRT_BASE_REPO catwrt_base
          cd catwrt_base
          chmod +x pull.sh main.sh
          sudo bash pull.sh
          sudo bash main.sh

      - name: Final build
        run: |
          cd lede
          make -j1 V=s

      - name: Prepare Docker context
        run: |
          ROOTFS_PATH=$(find lede/bin/targets -name "openwrt-*-rootfs.tar.gz" | head -n 1)
          if [ -z "$ROOTFS_PATH" ]; then
            echo "Rootfs not found, check target path"
            exit 1
          fi
          cp "$ROOTFS_PATH" rootfs.tar.gz
          if [ -f docker-entrypoint.sh ]; then
            chmod +x docker-entrypoint.sh
          fi
          ls -la

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}
