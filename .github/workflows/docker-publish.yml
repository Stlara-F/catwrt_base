# .github/workflows/build-push-docker.yml
# 构建 CatWrt 编译环境镜像并推送到 Docker Hub
# 优化版 (2026-04) - 解决磁盘/超时/缓存问题

name: Build and Push CatWrt Builder Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'build_catwrt_ci.sh'
      - 'docker-entrypoint.sh'
      - '.github/workflows/**'
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本标签'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt-builder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 🔧 优化点 1：强制释放磁盘空间（关键！）
      # 清除 Android、.NET、Haskell 等无用工具，可腾出约 20-30GB
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔧 优化点 2：设置 GitHub Actions 缓存（加速 ccache 与 go mod）
      # 编译过程产生的 ccache 和 go 构建缓存可跨工作流复用
      - name: Cache compiler artifacts
        uses: actions/cache@v4
        with:
          path: |
            /tmp/.buildx-cache
            /tmp/.ccache-catwrt
            /tmp/.go-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      # 🔧 优化点 3：先构建测试镜像，并使用环境变量限制线程数
      - name: Build and export for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          # 启用缓存挂载，让 Dockerfile 中的 ccache 目录能被缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      # 🔧 优化点 4：测试阶段显式设置单线程/低线程，防止 Runner 内存爆炸
      - name: Test image (Sanity & Syntax)
        run: |
          echo "测试容器启动..."
          docker run --rm ${{ env.IMAGE_NAME }}:test --help | grep -q "CatWrt"
          
          echo "测试环境完整性（限制线程为 2，避免 OOM）..."
          docker run --rm \
            -e MAKE_JOBS=2 \
            -e SINGLE_THREAD_FIRST=false \
            -e DEBUG=true \
            ${{ env.IMAGE_NAME }}:test bash -c "
              command -v git make gcc curl sudo ccache
              id builder
              test -w /home/lede && test -w /output
              echo '所有测试通过!'
            "
          
          echo "测试编译脚本语法..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -n /usr/local/bin/catwrt-build

      # 🔧 优化点 5：最终推送时同样使用缓存
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "CatWrt 全自动编译环境 Docker 镜像"
          readme-filepath: ./DOCKER_README.md

      - name: Summary
        run: |
          echo "## Docker 镜像构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**标签:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
