# .github/workflows/build-push-docker.yml
name: Build and Push CatWrt Builder Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'build_catwrt_ci.sh'
      - 'docker-entrypoint.sh'
      - '.github/workflows/**'
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本标签'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/catwrt-builder
  # 限制 GitHub Actions 上的编译线程数，防止 OOM
  MAKE_JOBS: 2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ⭐ 新增：释放磁盘空间（移除不需要的大型工具链）
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build and export for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          build-args: |
            MAKE_JOBS=${{ env.MAKE_JOBS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          echo "测试容器启动..."
          docker run --rm ${{ env.IMAGE_NAME }}:test --help | grep -q "CatWrt"
          
          echo "测试环境完整性..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -c "
            command -v git make gcc curl sudo ccache
            id builder
            test -w /home/lede && test -w /output
            echo '所有测试通过!'
          "
          
          echo "测试编译脚本语法..."
          docker run --rm ${{ env.IMAGE_NAME }}:test bash -n /usr/local/bin/catwrt-build

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            MAKE_JOBS=${{ env.MAKE_JOBS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "CatWrt 全自动编译环境 Docker 镜像"
          readme-filepath: ./DOCKER_README.md

      - name: Summary
        run: |
          echo "## Docker 镜像构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**标签:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
